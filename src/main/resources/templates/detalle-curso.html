<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">
    <title>Detalle Curso</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body style="background-color: #f8fafc;">

<nav class="navbar navbar-dark bg-primary py-3">
    <div class="container-fluid px-4">

        <span class="navbar-brand mb-0 h1">
            EduRush
        </span>

    </div>
</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card border-0 shadow rounded-4">

                <div class="card-body p-5">

                    <h2 class="fw-bold text-primary mb-4 d-flex align-items-center gap-2">

                        <i class="bi bi-eye-fill"></i>

                        Detalle del Curso

                    </h2>

                    <div class="mb-3">

                        <h6 class="text-secondary">
                            ID
                        </h6>

                        <p class="fs-5 fw-semibold"
                           th:text="${curso.idCurso}">
                        </p>

                    </div>

                    <div class="mb-3">

                        <h6 class="text-secondary">
                            Nombre
                        </h6>

                        <p class="fs-5 fw-semibold"
                           th:text="${curso.nombre}">
                        </p>

                    </div>

                    <div class="mb-3">

                        <h6 class="text-secondary">
                            Créditos
                        </h6>

                        <p class="fs-5 fw-semibold"
                           th:text="${curso.creditos}">
                        </p>

                    </div>

                    <div class="mb-3">

                        <h6 class="text-secondary">
                            Modalidad
                        </h6>

                        <span class="badge bg-primary px-3 py-2 fs-6"
                              th:text="${curso.modalidad}">
                        </span>

                    </div>

                    <div class="mb-4">

                        <h6 class="text-secondary">
                            Estado
                        </h6>

                        <span class="badge bg-success px-3 py-2 fs-6"
                              th:text="${curso.estado}">
                        </span>

                    </div>

                    <a th:href="@{/cursos}"
                       class="btn btn-secondary rounded-3 px-4">

                        <i class="bi bi-arrow-left-circle-fill me-1"></i>

                        Volver

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
