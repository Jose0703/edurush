<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Matrícula | Éxito</title>
    <th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body class="bg-light">
    <div th:replace="~{fragments/layout :: navbar_principal}"></div>

    <div class="container mt-4 pb-5">
        <div class="row justify-content-center mb-5">
            <div class="col-md-10 text-center">
                <div class="d-flex justify-content-between position-relative">
                    <div class="position-absolute top-50 start-0 translate-middle-y w-100 bg-success" style="height: 3px;"></div>
                    <div class="bg-light px-2 position-relative" style="z-index: 1;"><div class="rounded-circle bg-success text-white d-flex align-items-center justify-content-center mx-auto" style="width: 50px; height: 50px;"><i class="fas fa-check"></i></div></div>
                    <div class="bg-light px-2 position-relative" style="z-index: 1;"><div class="rounded-circle bg-success text-white d-flex align-items-center justify-content-center mx-auto" style="width: 50px; height: 50px;"><i class="fas fa-check"></i></div></div>
                    <div class="bg-light px-2 position-relative" style="z-index: 1;"><div class="rounded-circle bg-success text-white d-flex align-items-center justify-content-center mx-auto" style="width: 50px; height: 50px;"><i class="fas fa-check"></i></div></div>
                    <div class="bg-light px-2 position-relative" style="z-index: 1;"><div class="rounded-circle bg-success text-white d-flex align-items-center justify-content-center mx-auto" style="width: 50px; height: 50px;"><i class="fas fa-flag-checkered"></i></div></div>
                </div>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card border-0 shadow-lg overflow-hidden text-center">
                    <div class="bg-primary py-4 text-white">
                        <i class="fas fa-check-circle fa-4x mb-2"></i>
                        <h2 class="fw-bold mb-0">¡Registro Exitoso!</h2>
                    </div>
                    <div class="card-body p-5">
                        <p class="text-muted">Bienvenido(a) <strong><span th:text="${res.nombres}"></span></strong>, tu acceso ha sido generado:</p>
                        <div class="bg-light border p-4 rounded mb-4">
                            <p class="mb-2 text-secondary small text-uppercase fw-bold">Usuario Institucional</p>
                            <h4 class="fw-bold mb-3" th:text="${res.correoInstitucional}"></h4>
                            <p class="mb-2 text-secondary small text-uppercase fw-bold">Contraseña Temporal</p>
                            <h4 class="fw-bold" th:text="${res.passwordTemporal}"></h4>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <button onclick="window.print()" class="btn btn-outline-dark w-100 py-3"><i class="fas fa-file-pdf me-2"></i>Constancia</button>
                            </div>
                            <div class="col-md-6">
                                <a th:href="@{/login}" class="btn btn-primary w-100 py-3 shadow">INICIAR SESIÓN <i class="fas fa-sign-in-alt ms-2"></i></a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/layout :: scripts_imports}"></div>
</body>
</html>
