<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>EduRush | Inicio</title>
    <th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body class="bg-light">
    <div th:replace="~{fragments/layout :: navbar_principal}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
            <div class="col-md-8 text-center">
                <div class="card card-edurush p-5 shadow-lg">
                    <i class="fas fa-graduation-cap fa-5x text-primary mb-4"></i>
                    <h1 class="display-4 fw-bold">Bienvenido a <span class="text-primary">EduRush</span></h1>
                    <p class="lead text-muted mb-4">Sistema de Gestión Académica integral.</p>
                    
                    <hr class="my-4">

                    <div sec:authorize="!isAuthenticated()">
                        <p>Inicie sesión para acceder a su panel correspondiente.</p>
                        <a th:href="@{/login}" class="btn btn-primary btn-lg px-5">
                            <i class="fas fa-sign-in-alt me-2"></i>Ingresar al Sistema
                        </a>
                    </div>

                    <div sec:authorize="isAuthenticated()">
                        <p class="mb-3">Usted ya tiene una sesión activa.</p>
                        
                        <div sec:authorize="hasRole('ADMINISTRADOR')">
                            <a th:href="@{/admin/home}" class="btn btn-primary btn-lg">
                                <i class="fas fa-user-shield me-2"></i>Ir al Panel Administrativo
                            </a>
                        </div>
                        
                        <div sec:authorize="hasRole('DOCENTE')">
                            <a th:href="@{/docente/home}" class="btn btn-primary btn-lg">
                                <i class="fas fa-chalkboard-teacher me-2"></i>Ir al Panel Docente
                            </a>
                        </div>

                        <div sec:authorize="hasRole('ESTUDIANTE')">
                            <a th:href="@{/estudiante/home}" class="btn btn-primary btn-lg">
                                <i class="fas fa-user-graduate me-2"></i>Ir a mi Panel de Estudiante
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts_imports}"></div>
</body>
</html>
