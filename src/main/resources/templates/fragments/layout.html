<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head_imports">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

	<nav th:fragment="navbar_principal" class="navbar navbar-expand-lg navbar-custom shadow-sm mb-4">
	    <div class="container">
	        <a class="navbar-brand fw-bold text-white" th:href="@{/}">
	            <i class="fas fa-graduation-cap me-2"></i>EduRush
	        </a>
	
	        <button class="navbar-toggler border-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
	            <span class="navbar-toggler-icon"></span>
	        </button>
	
	        <div class="collapse navbar-collapse" id="navbarNav">
	            <ul class="navbar-nav ms-auto align-items-center">
	                
	                <li class="nav-item me-lg-3" sec:authorize="!isAuthenticated()">
	                    <a class="btn btn-warning fw-bold px-4 shadow-sm" th:href="@{/matricula/paso1}">
	                        <i class="fas fa-edit me-2"></i>Matricularse
	                    </a>
	                </li>
	
	                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
	                    <a class="nav-link dropdown-toggle text-white" href="#" role="button" data-bs-toggle="dropdown">
	                        <i class="fas fa-user-circle me-1"></i>
	                        <span sec:authentication="name">Usuario</span> 
	                        <span class="badge rounded-pill bg-light text-primary ms-1" 
	                              sec:authorize="hasRole('ADMINISTRADOR')">Admin</span>
	                        <span class="badge rounded-pill bg-light text-primary ms-1" 
	                              sec:authorize="hasRole('DOCENTE')">Docente</span>
	                        <span class="badge rounded-pill bg-light text-primary ms-1" 
	                              sec:authorize="hasRole('ESTUDIANTE')">Estudiante</span>
	                    </a>
	                    <ul class="dropdown-menu dropdown-menu-end shadow border-0">
	                        <li sec:authorize="hasRole('ADMINISTRADOR')">
	                            <a class="dropdown-item" th:href="@{/admin/home}"><i class="fas fa-tachometer-alt me-2"></i>Panel Admin</a>
	                        </li>
	                        <li sec:authorize="hasRole('ESTUDIANTE')">
	                            <a class="dropdown-item" th:href="@{/estudiante/home}"><i class="fas fa-user-graduate me-2"></i>Mi Portal</a>
	                        </li>
	                        <li sec:authorize="hasRole('DOCENTE')">
	                            <a class="dropdown-item" th:href="@{/docente/home}"><i class="fas fa-chalkboard-teacher me-2"></i>Portal Docente</a>
	                        </li>
	                        <li><hr class="dropdown-divider"></li>
	                        <li>
	                            <form th:action="@{/logout}" method="post" class="m-0">
	                                <button type="submit" class="dropdown-item text-danger">
	                                    <i class="fas fa-sign-out-alt me-2"></i>Cerrar Sesión
	                                </button>
	                            </form>
	                        </li>
	                    </ul>
	                </li>
	
	                <li class="nav-item" sec:authorize="!isAuthenticated()">
	                    <a class="btn btn-outline-light btn-sm px-4" th:href="@{/login}">Iniciar Sesión</a>
	                </li>
	            </ul>
	        </div>
	    </div>
	</nav>

    <div th:fragment="scripts_imports">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </div>
</body>
</html>
