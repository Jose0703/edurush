<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EduRush | Gestión de Matrículas</title>
    <th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body>
    <div th:replace="~{fragments/layout :: navbar_principal}"></div>

    <div class="container mt-5">
        <div class="card card-edurush p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-dark">
                    <i class="fas fa-edit me-2 text-primary"></i>Registro de Matrículas
                </h3>
                <a th:href="@{/admin/matriculas/nuevo}" class="btn btn-primary px-4 shadow-sm">
                    <i class="fas fa-plus-circle me-1"></i> Nueva Matrícula
                </a>
            </div>
            <div class="rounded-table-container">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark-custom">
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Estudiante</th>
                            <th>Carrera</th>
                            <th>Periodo</th>
                            <th class="text-center">Ciclo</th>
                            <th>Estado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="m : ${matriculas}">
                            <td class="ps-4 fw-bold" th:text="${m.idMatricula}"></td>
                            <td th:text="${m.estudianteCarrera.estudiante.nombres + ' ' + m.estudianteCarrera.estudiante.apellidos}"></td>
                            <td th:text="${m.estudianteCarrera.carrera.nombre}"></td>
                            <td th:text="${m.periodo.nombre}"></td>
                            <td class="text-center fw-bold text-primary" th:text="${m.ciclo}"></td>
                            <td>
                                <span th:class="${m.estado == 'matriculado' ? 'badge bg-success' : 
                                                 (m.estado == 'pre_matriculado' ? 'badge bg-warning text-dark' : 'badge bg-danger')}" 
                                      th:text="${m.estado}"></span>
                            </td>
                            <td class="text-center">
                                <div class="btn-group shadow-sm">
                                    <a th:href="@{/admin/matriculas/ver/{id}(id=${m.idMatricula})}" 
                                       class="btn btn-sm btn-outline-secondary" title="Ver Ficha">
                                        <i class="fas fa-eye text-primary"></i>
                                    </a>
                                    <a th:href="@{/admin/matriculas/editar/{id}(id=${m.idMatricula})}" 
                                       class="btn btn-sm btn-outline-secondary" title="Editar">
                                        <i class="fas fa-edit text-warning"></i>
                                    </a>
                                    <a th:href="@{/admin/matriculas/eliminar/{id}(id=${m.idMatricula})}" 
                                       class="btn btn-sm btn-outline-secondary" title="Inactivar"
                                       onclick="return confirm('¿Está seguro de inactivar esta matrícula?')">
                                        <i class="fas fa-user-slash text-danger"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/layout :: scripts_imports}"></div>
</body>
</html>
