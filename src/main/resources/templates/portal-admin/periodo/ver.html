<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EduRush | Detalles de Periodo</title>
    <th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body>
    <div th:replace="~{fragments/layout :: navbar_principal}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card card-edurush text-center p-4">
                    <div class="my-3 text-primary">
                        <i class="fas fa-calendar-alt fa-4x shadow-sm rounded-circle p-3 bg-light"></i>
                    </div>
                    <h3 class="fw-bold mb-0" th:text="${p.nombre}"></h3>
                    <p class="text-muted" th:text="${'ID Sistema: #' + p.idPeriodo}"></p>
                    
                    <div class="rounded-table-container bg-white p-3 text-start mb-4 shadow-sm">
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item d-flex justify-content-between align-items-center py-3">
                                <span class="text-secondary fw-bold">Fecha de Apertura:</span>
                                <span class="text-dark fw-bold" th:text="${#temporals.format(p.fechaInicio, 'dd MMMM yyyy')}"></span>
                            </li>
                            <li class="list-group-item d-flex justify-content-between align-items-center py-3">
                                <span class="text-secondary fw-bold">Fecha de Cierre:</span>
                                <span class="text-dark fw-bold" th:text="${#temporals.format(p.fechaFin, 'dd MMMM yyyy')}"></span>
                            </li>
                            <li class="list-group-item d-flex justify-content-between align-items-center py-3">
                                <span class="text-secondary fw-bold">Estado Actual:</span>
                                <span th:class="${p.estado == 'abierto' ? 'badge bg-success py-2 px-3' : 'badge bg-secondary py-2 px-3'}" 
                                      th:text="${p.estado}"></span>
                            </li>
                        </ul>
                    </div>

                    <div class="d-grid gap-2">
                        <a th:href="@{/admin/periodos/editar/{id}(id=${p.idPeriodo})}" class="btn btn-warning">
                            <i class="fas fa-edit me-1"></i> Editar Configuración
                        </a>
                        <a th:href="@{/admin/periodos}" class="btn btn-outline-primary">Volver al Listado</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/layout :: scripts_imports}"></div>
</body>
</html>
