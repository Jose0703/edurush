<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EduRush | Gestión de Periodos</title>
    <th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body>
    <div th:replace="~{fragments/layout :: navbar_principal}"></div>

    <div class="container mt-5">
        <div class="card card-edurush p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-dark">
                    <i class="fas fa-calendar-check me-2 text-primary"></i>Periodos Académicos
                </h3>
                <a th:href="@{/admin/periodos/nuevo}" class="btn btn-primary px-4 shadow-sm">
                    <i class="fas fa-plus-circle me-1"></i> Nuevo Periodo
                </a>
            </div>
            <div class="rounded-table-container">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark-custom">
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Nombre Periodo</th>
                            <th>Fecha Inicio</th>
                            <th>Fecha Fin</th>
                            <th>Estado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${periodos}">
                            <td class="ps-4 fw-bold" th:text="${p.idPeriodo}"></td>
                            <td class="fw-bold text-primary" th:text="${p.nombre}"></td>
                            <td th:text="${#temporals.format(p.fechaInicio, 'dd/MM/yyyy')}"></td>
                            <td th:text="${#temporals.format(p.fechaFin, 'dd/MM/yyyy')}"></td>
                            <td>
                                <span th:class="${p.estado == 'abierto' ? 'badge bg-success' : 'badge bg-secondary'}" 
                                      th:text="${p.estado}"></span>
                            </td>
                            <td class="text-center">
                                <div class="btn-group shadow-sm">
                                    <a th:href="@{/admin/periodos/ver/{id}(id=${p.idPeriodo})}" 
                                       class="btn btn-sm btn-outline-secondary" title="Ver Detalles">
                                        <i class="fas fa-eye text-primary"></i>
                                    </a>
                                    <a th:href="@{/admin/periodos/editar/{id}(id=${p.idPeriodo})}" 
                                       class="btn btn-sm btn-outline-secondary" title="Editar">
                                        <i class="fas fa-edit text-warning"></i>
                                    </a>
                                    <a th:href="@{/admin/periodos/eliminar/{id}(id=${p.idPeriodo})}" 
                                       class="btn btn-sm btn-outline-secondary" title="Inactivar"
                                       onclick="return confirm('¿Está seguro de inactivar este periodo?')">
                                        <i class="fas fa-trash-alt text-danger"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/layout :: scripts_imports}"></div>
</body>
</html>
