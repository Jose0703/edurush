<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EduRush | Gestión de Docentes</title>
    <th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body>

    <div th:replace="~{fragments/layout :: navbar_principal}"></div>

    <div class="container mt-5">
        <div class="card card-edurush p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-dark">
                    <i class="fas fa-chalkboard-teacher me-2 text-primary"></i>Gestión de Docentes
                </h3>

                <a th:href="@{/admin/docentes/nuevo}" class="btn btn-primary px-4 shadow-sm">
                    <i class="fas fa-plus-circle me-1"></i> Nuevo Docente
                </a>
            </div>

            <div class="rounded-table-container">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark-custom">
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Docente</th>
                            <th>DNI</th>
                            <th>Celular</th>
                            <th>Email</th>
                            <th>Especialidad</th>
                            <th>Usuario</th>
                            <th>Estado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="d : ${docentes}">
                            <td class="ps-4 fw-bold" th:text="${d.idDocente}"></td>

                            <td>
                                <div class="fw-bold" th:text="${d.nombres + ' ' + d.apellidos}"></div>
                                <small class="text-muted" th:text="${d.fechaNacimiento != null ? d.fechaNacimiento : 'Sin fecha'}"></small>
                            </td>

                            <td th:text="${d.dni}"></td>

                            <td th:text="${d.celular}"></td>

                            <td th:text="${d.email}"></td>

                            <td>
                                <span class="badge bg-primary-subtle text-primary px-3 py-2"
                                      th:text="${d.especialidad != null ? d.especialidad : 'No asignada'}">
                                </span>
                            </td>

                            <td>
                                <span th:if="${d.usuario != null}" th:text="${d.usuario.correo}"></span>
                                <span th:if="${d.usuario == null}" class="text-muted">Sin usuario</span>
                            </td>

                            <td>
                                <span class="badge bg-success" th:text="${d.estado}"></span>
                            </td>

                            <td class="text-center">
                                <div class="btn-group shadow-sm">
                                    <a th:href="@{/admin/docentes/ver/{id}(id=${d.idDocente})}"
                                       class="btn btn-sm btn-outline-secondary"
                                       title="Ver Detalles">
                                        <i class="fas fa-eye text-primary"></i>
                                    </a>

                                    <a th:href="@{/admin/docentes/editar/{id}(id=${d.idDocente})}"
                                       class="btn btn-sm btn-outline-secondary"
                                       title="Editar">
                                        <i class="fas fa-edit text-warning"></i>
                                    </a>

                                    <a th:href="@{/admin/docentes/eliminar/{id}(id=${d.idDocente})}"
                                       class="btn btn-sm btn-outline-secondary"
                                       title="Inactivar"
                                       onclick="return confirm('¿Seguro que desea inactivar este docente?')">
                                        <i class="fas fa-user-slash text-danger"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(docentes)}">
                            <td colspan="9" class="text-center text-muted py-4">
                                No hay docentes registrados.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts_imports}"></div>
</body>
</html>
