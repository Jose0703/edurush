<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EduRush | Formulario Docente</title>
    <th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body>
    <div th:replace="~{fragments/layout :: navbar_principal}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card card-edurush">
                    <div class="card-header bg-white border-0 pt-4">
                        <h4 class="fw-bold text-center text-primary" th:text="${titulo}"></h4>
                    </div>

                    <div class="card-body p-4">
                        <form th:action="@{/admin/docentes/guardar}" th:object="${docente}" method="post">

                            <input type="hidden" th:field="*{idDocente}">

                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">Usuario vinculado</label>
                                <select th:field="*{usuario.idUsuario}" class="form-select form-select-lg" required>
                                    <option value="">Seleccione un usuario</option>

                                    <option th:each="u : ${usuarios}"
                                            th:value="${u.idUsuario}"
                                            th:text="${u.correo}">
                                    </option>
                                </select>

                                <small class="text-muted">
                                    Selecciona el usuario del sistema que pertenecerá a este docente.
                                </small>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold text-secondary">Nombres</label>
                                    <input type="text"
                                           th:field="*{nombres}"
                                           class="form-control form-control-lg"
                                           placeholder="Ingrese nombres"
                                           required>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold text-secondary">Apellidos</label>
                                    <input type="text"
                                           th:field="*{apellidos}"
                                           class="form-control form-control-lg"
                                           placeholder="Ingrese apellidos"
                                           required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold text-secondary">DNI</label>
                                    <input type="text"
                                           th:field="*{dni}"
                                           class="form-control form-control-lg"
                                           placeholder="Ingrese DNI"
                                           maxlength="8"
                                           required>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold text-secondary">Celular</label>
                                    <input type="text"
                                           th:field="*{celular}"
                                           class="form-control form-control-lg"
                                           placeholder="Ingrese celular"
                                           maxlength="9"
                                           required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">Correo del Docente</label>
                                <input type="email"
                                       th:field="*{email}"
                                       class="form-control form-control-lg"
                                       placeholder="docente@edurush.pe">
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold text-secondary">Fecha de Nacimiento</label>
                                    <input type="date"
                                           th:field="*{fechaNacimiento}"
                                           class="form-control form-control-lg">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold text-secondary">Especialidad</label>
                                    <input type="text"
                                           th:field="*{especialidad}"
                                           class="form-control form-control-lg"
                                           placeholder="Ej. Programación">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">Estado</label>
                                <select th:field="*{estado}" class="form-select text-capitalize">
                                    <option value="activo">Activo</option>
                                    <option value="inactivo">Inactivo</option>
                                </select>
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-primary btn-lg shadow-sm">
                                    Guardar Docente
                                </button>

                                <a th:href="@{/admin/docentes}" class="btn btn-link text-decoration-none">
                                    Regresar
                                </a>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts_imports}"></div>
</body>
</html>
