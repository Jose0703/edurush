<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EduRush | Detalles de Docente</title>
    <th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body>
    <div th:replace="~{fragments/layout :: navbar_principal}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card card-edurush text-center p-4">

                    <div class="my-3">
                        <i class="fas fa-chalkboard-teacher fa-4x text-primary shadow-sm rounded-circle p-3 bg-light"></i>
                    </div>

                    <h3 class="fw-bold mb-0" th:text="${docente.nombres + ' ' + docente.apellidos}"></h3>
                    <p class="text-muted mb-4">Información del docente</p>

                    <ul class="list-group list-group-flush text-start mb-4">

                        <li class="list-group-item d-flex justify-content-between">
                            <span class="text-secondary">ID Docente:</span>
                            <span th:text="${docente.idDocente}"></span>
                        </li>

                        <li class="list-group-item d-flex justify-content-between">
                            <span class="text-secondary">Usuario vinculado:</span>
                            <span class="fw-bold text-primary"
                                  th:text="${docente.usuario != null ? docente.usuario.correo : 'Sin usuario'}">
                            </span>
                        </li>

                        <li class="list-group-item d-flex justify-content-between">
                            <span class="text-secondary">DNI:</span>
                            <span th:text="${docente.dni}"></span>
                        </li>

                        <li class="list-group-item d-flex justify-content-between">
                            <span class="text-secondary">Celular:</span>
                            <span th:text="${docente.celular}"></span>
                        </li>

                        <li class="list-group-item d-flex justify-content-between">
                            <span class="text-secondary">Email:</span>
                            <span th:text="${docente.email}"></span>
                        </li>

                        <li class="list-group-item d-flex justify-content-between">
                            <span class="text-secondary">Fecha de nacimiento:</span>
                            <span th:text="${docente.fechaNacimiento != null ? docente.fechaNacimiento : 'No registrada'}"></span>
                        </li>

                        <li class="list-group-item d-flex justify-content-between">
                            <span class="text-secondary">Especialidad:</span>
                            <span class="fw-bold text-primary"
                                  th:text="${docente.especialidad != null ? docente.especialidad : 'No asignada'}">
                            </span>
                        </li>

                        <li class="list-group-item d-flex justify-content-between">
                            <span class="text-secondary">Estado actual:</span>
                            <span class="badge bg-success py-2 px-3" th:text="${docente.estado}"></span>
                        </li>

                    </ul>

                    <div class="d-grid gap-2">
                        <a th:href="@{/admin/docentes/editar/{id}(id=${docente.idDocente})}"
                           class="btn btn-primary">
                            Editar Docente
                        </a>

                        <a th:href="@{/admin/docentes}"
                           class="btn btn-outline-primary">
                            Volver al Listado
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts_imports}"></div>
</body>
</html>
