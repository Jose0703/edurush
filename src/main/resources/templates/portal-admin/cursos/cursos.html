<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">
    <title>EduRush | Gestión de Cursos</title>
	<th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body>

    <div th:replace="~{fragments/layout :: navbar_principal}"></div>

    <div class="container mt-5">
        <div class="card card-edurush p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-dark">
                    <i class="fas fa-book me-2 text-primary"></i>Gestión de Cursos
                </h3>
                <a th:href="@{/cursos/nuevo}" class="btn btn-primary px-4 shadow-sm">
                    <i class="fas fa-plus-circle me-1"></i> Nuevo Curso
                </a>
            </div>

            <div class="rounded-table-container">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark-custom">
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Nombre</th>
                            <th>Créditos</th>
                            <th>Modalidad</th>
                            <th>Estado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="c : ${cursos}">
                            <td class="ps-4 fw-bold" th:text="${c.idCurso}"></td>
                            <td th:text="${c.nombre}"></td>
                            <td th:text="${c.creditos}"></td>
                            <td>
                                <span class="badge bg-primary-subtle text-primary px-3 py-2"
                                      th:text="${c.modalidad}"></span>
                            </td>
                            <td>
                                <span class="badge bg-success"
                                      th:text="${c.estado}"></span>
                            </td>
                            <td class="text-center">
                                <div class="btn-group shadow-sm">
                                    <a th:href="@{/cursos/detalle/{id}(id=${c.idCurso})}"
                                       class="btn btn-sm btn-outline-secondary" title="Ver Detalles">
                                        <i class="fas fa-eye text-primary"></i>
                                    </a>

                                    <a th:href="@{/cursos/editar/{id}(id=${c.idCurso})}"
                                       class="btn btn-sm btn-outline-secondary" title="Editar">
                                        <i class="fas fa-edit text-warning"></i>
                                    </a>

                                    <a th:href="@{/cursos/eliminar/{id}(id=${c.idCurso})}"
                                       class="btn btn-sm btn-outline-secondary" title="Inactivar"
                                       onclick="return confirm('¿Seguro que desea inactivar este curso?')">
                                        <i class="fas fa-trash text-danger"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>

                </table>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts_imports}"></div>
</body>
</html>
