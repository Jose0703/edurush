<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EduRush | Formulario Curso</title>
    <th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body>

    <div th:replace="~{fragments/layout :: navbar_principal}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">

                <div class="card card-edurush">

                    <div class="card-header bg-white border-0 pt-4">
                        <h4 class="fw-bold text-center text-primary">
                            Formulario Curso
                        </h4>
                    </div>

                    <div class="card-body p-4">

                        <form th:action="@{/cursos/guardar}"
                              th:object="${curso}"
                              method="post">

                            <input type="hidden" th:field="*{idCurso}">

                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">
                                    Nombre del Curso
                                </label>

                                <input type="text"
                                       th:field="*{nombre}"
                                       class="form-control"
                                       required>
                            </div>

                            <div class="row">

                                <div class="col-md-6 mb-3">

                                    <label class="form-label fw-bold text-secondary">
                                        Créditos
                                    </label>

                                    <input type="number"
                                           th:field="*{creditos}"
                                           class="form-control"
                                           required>
                                </div>

                                <div class="col-md-6 mb-3">

                                    <label class="form-label fw-bold text-secondary">
                                        Modalidad
                                    </label>

                                    <select th:field="*{modalidad}"
                                            class="form-select">

                                        <option value="presencial">
                                            Presencial
                                        </option>

                                        <option value="virtual">
                                            Virtual
                                        </option>

                                        <option value="semipresencial">
                                            Semipresencial
                                        </option>

                                    </select>

                                </div>

                            </div>

                            <div class="d-grid gap-2 mt-4">

                                <button type="submit"
                                        class="btn btn-primary btn-lg shadow-sm">

                                    Guardar Curso

                                </button>

                                <a th:href="@{/cursos}"
                                   class="btn btn-link text-decoration-none">

                                    Regresar

                                </a>

                            </div>

                        </form>

                    </div>

                </div>

            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts_imports}"></div>

</body>
</html>
