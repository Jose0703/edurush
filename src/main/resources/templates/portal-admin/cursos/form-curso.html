<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">
    <title>Formulario Curso</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body style="background-color: #f8fafc;">

<nav class="navbar navbar-dark bg-primary py-3">
    <div class="container-fluid px-4">

        <span class="navbar-brand mb-0 h1">
            EduRush
        </span>

    </div>
</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card border-0 shadow rounded-4">

                <div class="card-body p-5">

                    <h2 class="fw-bold text-primary mb-4 d-flex align-items-center gap-2">

                        <i class="bi bi-journal-bookmark-fill"></i>

                        Formulario Curso

                    </h2>

                    <form th:action="@{/cursos/guardar}"
                          th:object="${curso}"
                          method="post">

                        <input type="hidden"
                               th:field="*{idCurso}">

                        <div class="mb-4">

                            <label class="form-label fw-semibold">
                                Nombre del Curso
                            </label>

                            <input type="text"
                                   th:field="*{nombre}"
                                   class="form-control rounded-3"
                                   required>

                        </div>

                        <div class="mb-4">

                            <label class="form-label fw-semibold">
                                Créditos
                            </label>

                            <input type="number"
                                   th:field="*{creditos}"
                                   class="form-control rounded-3"
                                   required>

                        </div>

                        <div class="mb-4">

                            <label class="form-label fw-semibold">
                                Modalidad
                            </label>

                            <select th:field="*{modalidad}"
                                    class="form-select rounded-3">

                                <option value="presencial">
                                    Presencial
                                </option>

                                <option value="virtual">
                                    Virtual
                                </option>

                                <option value="semipresencial">
                                    Semipresencial
                                </option>

                            </select>

                        </div>

                        <div class="d-flex gap-2">

                            <button type="submit"
                                    class="btn btn-primary rounded-3 px-4">

                                <i class="bi bi-floppy-fill me-1"></i>

                                Guardar

                            </button>

                            <a th:href="@{/cursos}"
                               class="btn btn-secondary rounded-3 px-4">

                                <i class="bi bi-arrow-left-circle-fill me-1"></i>

                                Volver

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
