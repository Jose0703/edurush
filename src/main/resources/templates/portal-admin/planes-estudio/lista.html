<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EduRush | Gestión de Planes de Estudio</title>
    <th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body>

    <div th:replace="~{fragments/layout :: navbar_principal}"></div>

    <div class="container mt-5">
        <div class="card card-edurush p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-dark">
                    <i class="fas fa-layer-group me-2 text-primary"></i>Gestión de Planes de Estudio
                </h3>

                <a th:href="@{/admin/planes-estudio/nuevo}" class="btn btn-primary px-4 shadow-sm">
                    <i class="fas fa-plus-circle me-1"></i> Nuevo Plan
                </a>
            </div>

            <div class="rounded-table-container">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark-custom">
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Nombre del Plan</th>
                            <th>Carrera</th>
                            <th>Duración</th>
                            <th>Modalidad</th>
                            <th>Estado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="p : ${planes}">
                            <td class="ps-4 fw-bold" th:text="${p.idPlanEstudio}"></td>

                            <td>
                                <span class="fw-bold" th:text="${p.nombre}"></span>
                            </td>

                            <td>
                                <span th:text="${p.carrera != null ? p.carrera.nombre : 'Sin carrera'}"></span>
                            </td>

                            <td>
                                <span th:text="${p.carrera != null ? p.carrera.duracionCiclos + ' ciclos' : 'No definido'}"></span>
                            </td>

                            <td>
                                <span class="badge bg-primary-subtle text-primary px-3 py-2"
                                      th:text="${p.carrera != null ? p.carrera.modalidad : 'Sin modalidad'}">
                                </span>
                            </td>

                            <td>
                                <span class="badge px-3 py-2"
                                      th:classappend="${p.estado == 'vigente'} ? ' bg-success' : 
                                                      (${p.estado == 'retirado'} ? ' bg-warning text-dark' : ' bg-secondary')"
                                      th:text="${p.estado}">
                                </span>
                            </td>

                            <td class="text-center">
                                <div class="btn-group shadow-sm">
                                    <a th:href="@{/admin/planes-estudio/ver/{id}(id=${p.idPlanEstudio})}"
                                       class="btn btn-sm btn-outline-secondary"
                                       title="Ver Detalles">
                                        <i class="fas fa-eye text-primary"></i>
                                    </a>

                                    <a th:href="@{/admin/planes-estudio/editar/{id}(id=${p.idPlanEstudio})}"
                                       class="btn btn-sm btn-outline-secondary"
                                       title="Editar">
                                        <i class="fas fa-edit text-warning"></i>
                                    </a>

                                    <a th:href="@{/admin/planes-estudio/eliminar/{id}(id=${p.idPlanEstudio})}"
                                       class="btn btn-sm btn-outline-secondary"
                                       title="Inactivar"
                                       onclick="return confirm('¿Seguro que desea inactivar este plan de estudio?')">
                                        <i class="fas fa-ban text-danger"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(planes)}">
                            <td colspan="7" class="text-center text-muted py-4">
                                No hay planes de estudio registrados.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts_imports}"></div>
</body>
</html>
