<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EduRush | Formulario Plan de Estudio</title>
    <th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body>
    <div th:replace="~{fragments/layout :: navbar_principal}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card card-edurush">
                    <div class="card-header bg-white border-0 pt-4">
                        <h4 class="fw-bold text-center text-primary" th:text="${titulo}"></h4>
                    </div>

                    <div class="card-body p-4">
                        <form th:action="@{/admin/planes-estudio/guardar}"
                              th:object="${planEstudio}"
                              method="post">

                            <input type="hidden" th:field="*{idPlanEstudio}">

                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">Carrera</label>
                                <select th:field="*{carrera.idCarrera}"
                                        class="form-select form-select-lg"
                                        required>
                                    <option value="">Seleccione una carrera</option>

                                    <option th:each="c : ${carreras}"
                                            th:value="${c.idCarrera}"
                                            th:text="${c.nombre}">
                                    </option>
                                </select>

                                <small class="text-muted">
                                    El plan de estudio quedará vinculado a la carrera seleccionada.
                                </small>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">Nombre del Plan</label>
                                <input type="text"
                                       th:field="*{nombre}"
                                       class="form-control form-control-lg"
                                       placeholder="Ej. Plan 2026 - Desarrollo de Sistemas"
                                       maxlength="100"
                                       required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">Estado</label>
                                <select th:field="*{estado}" class="form-select form-select-lg text-capitalize">
                                    <option value="vigente">Vigente</option>
                                    <option value="retirado">Retirado</option>
                                    <option value="inactivo">Inactivo</option>
                                </select>
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-primary btn-lg shadow-sm">
                                    Guardar Plan de Estudio
                                </button>

                                <a th:href="@{/admin/planes-estudio}" class="btn btn-link text-decoration-none">
                                    Regresar
                                </a>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts_imports}"></div>
</body>
</html>
