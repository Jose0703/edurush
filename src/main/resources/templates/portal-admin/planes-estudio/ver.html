<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EduRush | Detalles del Plan de Estudio</title>
    <th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body>
    <div th:replace="~{fragments/layout :: navbar_principal}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card card-edurush text-center p-4">

                    <div class="my-3">
                        <i class="fas fa-layer-group fa-4x text-primary shadow-sm rounded-circle p-3 bg-light"></i>
                    </div>

                    <h3 class="fw-bold mb-0" th:text="${planEstudio.nombre}"></h3>
                    <p class="text-muted mb-4">Información del plan de estudio</p>

                    <ul class="list-group list-group-flush text-start mb-4">

                        <li class="list-group-item d-flex justify-content-between">
                            <span class="text-secondary">ID Plan:</span>
                            <span th:text="${planEstudio.idPlanEstudio}"></span>
                        </li>

                        <li class="list-group-item d-flex justify-content-between">
                            <span class="text-secondary">Carrera:</span>
                            <span class="fw-bold text-primary"
                                  th:text="${planEstudio.carrera != null ? planEstudio.carrera.nombre : 'Sin carrera'}">
                            </span>
                        </li>

                        <li class="list-group-item d-flex justify-content-between">
                            <span class="text-secondary">Duración:</span>
                            <span th:text="${planEstudio.carrera != null ? planEstudio.carrera.duracionCiclos + ' ciclos' : 'No definido'}"></span>
                        </li>

                        <li class="list-group-item d-flex justify-content-between">
                            <span class="text-secondary">Turno:</span>
                            <span th:text="${planEstudio.carrera != null ? planEstudio.carrera.turno : 'No definido'}"></span>
                        </li>

                        <li class="list-group-item d-flex justify-content-between">
                            <span class="text-secondary">Modalidad:</span>
                            <span th:text="${planEstudio.carrera != null ? planEstudio.carrera.modalidad : 'No definido'}"></span>
                        </li>

                        <li class="list-group-item d-flex justify-content-between">
                            <span class="text-secondary">Estado actual:</span>
                            <span class="badge py-2 px-3"
                                  th:classappend="${planEstudio.estado == 'vigente'} ? ' bg-success' : 
                                                  (${planEstudio.estado == 'retirado'} ? ' bg-warning text-dark' : ' bg-secondary')"
                                  th:text="${planEstudio.estado}">
                            </span>
                        </li>

                    </ul>

                    <div class="d-grid gap-2">
                        <a th:href="@{/admin/planes-estudio/editar/{id}(id=${planEstudio.idPlanEstudio})}"
                           class="btn btn-primary">
                            Editar Plan
                        </a>

                        <a th:href="@{/admin/planes-estudio}"
                           class="btn btn-outline-primary">
                            Volver al Listado
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts_imports}"></div>
</body>
</html>
