<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EduRush | Detalles de Estudiante</title>
    <th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body>
    <div th:replace="~{fragments/layout :: navbar_principal}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card card-edurush text-center p-4">
                    <div class="my-3">
                        <i class="fas fa-user-graduate fa-4x text-primary shadow-sm rounded-circle p-3 bg-light"></i>
                    </div>
                    <h3 class="fw-bold mb-0" th:text="${estudiante.nombres + ' ' + estudiante.apellidos}"></h3>
                    <p class="text-muted mb-4" th:text="'DNI: ' + ${estudiante.dni}"></p>
                    
                    <ul class="list-group list-group-flush text-start mb-4">
                        <li class="list-group-item d-flex justify-content-between">
                            <span class="text-secondary">Correo:</span>
                            <span class="fw-bold" th:text="${estudiante.email}"></span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between">
                            <span class="text-secondary">Celular:</span>
                            <span th:text="${estudiante.celular}"></span>
                        </li>
						<li class="list-group-item d-flex justify-content-between align-items-center">
						    <span class="text-secondary"><i class="fas fa-id-badge me-2"></i>Cuenta Institucional:</span>
						    <span class="fw-bold text-primary" th:text="${estudiante.usuario.correo}"></span>
						</li>
                        <li class="list-group-item d-flex justify-content-between">
                            <span class="text-secondary">Estado:</span>
                            <span th:classappend="${estudiante.estado == 'activo' ? 'bg-success' : 'bg-danger'}" 
                                  class="badge py-2 px-3" th:text="${estudiante.estado}"></span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between">
                            <span class="text-secondary">Fecha Registro:</span>
                            <span th:text="${#temporals.format(estudiante.fechaRegistro, 'dd/MM/yyyy HH:mm')}"></span>
                        </li>
                    </ul>

                    <div class="d-grid gap-2">
                        <a th:href="@{/admin/estudiantes/editar/{id}(id=${estudiante.idEstudiante})}" class="btn btn-warning">Editar Datos</a>
                        <a th:href="@{/admin/estudiantes}" class="btn btn-outline-primary">Volver al Listado</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/layout :: scripts_imports}"></div>
</body>
</html>
