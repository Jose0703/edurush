<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EduRush | Gestión de Estudiantes</title>
    <th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body>

    <div th:replace="~{fragments/layout :: navbar_principal}"></div>

    <div class="container mt-5">
        <div class="card card-edurush p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-dark">
                    <i class="fas fa-user-graduate me-2 text-primary"></i>Gestión de Estudiantes
                </h3>
                <a th:href="@{/admin/estudiantes/nuevo}" class="btn btn-primary px-4 shadow-sm">
                    <i class="fas fa-plus-circle me-1"></i> Nuevo Estudiante
                </a>
            </div>
            <div class="rounded-table-container">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark-custom">
                        <tr>
                            <th class="ps-4">DNI</th>
                            <th>Estudiante</th>
                            <th>Celular</th>
                            <th>Email</th>
                            <th>Estado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="e : ${estudiantes}">
                            <td class="ps-4 fw-bold" th:text="${e.dni}"></td>
                            <td th:text="${e.nombres + ' ' + e.apellidos}"></td>
                            <td th:text="${e.celular}"></td>
                            <td th:text="${e.email}"></td>
                            <td>
                                <span th:classappend="${e.estado == 'activo' ? 'badge bg-success' : 'badge bg-danger'}" 
                                      th:text="${e.estado}" class="badge"></span>
                            </td>
                            <td class="text-center">
                                <div class="btn-group shadow-sm">
                                    <a th:href="@{/admin/estudiantes/ver/{id}(id=${e.idEstudiante})}" 
                                       class="btn btn-sm btn-outline-secondary" title="Ver Detalles">
                                        <i class="fas fa-eye text-primary"></i>
                                    </a>
                                    <a th:href="@{/admin/estudiantes/editar/{id}(id=${e.idEstudiante})}" 
                                       class="btn btn-sm btn-outline-secondary" title="Editar">
                                        <i class="fas fa-edit text-warning"></i>
                                    </a>
                                    <a th:href="@{/admin/estudiantes/eliminar/{id}(id=${e.idEstudiante})}" 
                                       class="btn btn-sm btn-outline-secondary" title="Inactivar"
                                       onclick="return confirm('¿Seguro que desea inactivar este estudiante?')">
                                        <i class="fas fa-user-slash text-danger"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts_imports}"></div>
</body>
</html>
