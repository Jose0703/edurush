<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EduRush | Formulario Carrera</title>
    <th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body>

    <div th:replace="~{fragments/layout :: navbar_principal}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">

                <div class="card card-edurush">
                    <div class="card-header bg-white border-0 pt-4">
                        <h4 class="fw-bold text-center text-primary">Formulario Carrera</h4>
                    </div>

                    <div class="card-body p-4">
                        <form th:action="@{/carreras/guardar}" th:object="${carrera}" method="post">

                            <input type="hidden" th:field="*{idCarrera}">

                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">Nombre de la Carrera</label>
                                <input type="text" th:field="*{nombre}" class="form-control" required>
                            </div>

                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label class="form-label fw-bold text-secondary">Duración Ciclos</label>
                                    <input type="number" th:field="*{duracionCiclos}" class="form-control" required>
                                </div>

                                <div class="col-md-4 mb-3">
                                    <label class="form-label fw-bold text-secondary">Turno</label>
                                    <select th:field="*{turno}" class="form-select">
                                        <option value="mañana">Mañana</option>
                                        <option value="tarde">Tarde</option>
                                        <option value="noche">Noche</option>
                                    </select>
                                </div>

                                <div class="col-md-4 mb-3">
                                    <label class="form-label fw-bold text-secondary">Modalidad</label>
                                    <select th:field="*{modalidad}" class="form-select">
                                        <option value="presencial">Presencial</option>
                                        <option value="virtual">Virtual</option>
                                        <option value="semipresencial">Semipresencial</option>
                                    </select>
                                </div>
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-primary btn-lg shadow-sm">
                                    Guardar Carrera
                                </button>

                                <a th:href="@{/carreras}" class="btn btn-link text-decoration-none">
                                    Regresar
                                </a>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts_imports}"></div>
</body>
</html>
