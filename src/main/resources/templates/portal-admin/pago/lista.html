<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EduRush | Historial de Pagos</title>
    <th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body>
    <div th:replace="~{fragments/layout :: navbar_principal}"></div>

    <div class="container mt-5">
        <div class="card card-edurush p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-dark">
                    <i class="fas fa-cash-register me-2 text-primary"></i>Historial de Pagos
                </h3>
                <a th:href="@{/admin/pagos/nuevo}" class="btn btn-primary px-4 shadow-sm">
                    <i class="fas fa-check-double me-1"></i> Registrar Nuevo Pago
                </a>
            </div>
            <div class="rounded-table-container">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark-custom">
                        <tr>
                            <th class="ps-4">ID Pago</th>
                            <th>Estudiante</th>
                            <th>Orden Ref.</th>
                            <th>Monto Cobrado</th>
                            <th>Fecha Pago</th>
                            <th>Estado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${pagos}">
                            <td class="ps-4 fw-bold" th:text="${p.idPago}"></td>
                            <td>
                                <span class="fw-bold" th:text="${p.ordenPago.estudiante.nombres + ' ' + p.ordenPago.estudiante.apellidos}"></span>
                            </td>
                            <td th:text="${'#' + p.ordenPago.idOrdenPago}"></td>
                            <td class="fw-bold text-success" th:text="${'S/ ' + #numbers.formatDecimal(p.montoPagado, 1, 2)}"></td>
                            <td th:text="${#temporals.format(p.fechaPago, 'dd/MM/yyyy HH:mm')}"></td>
                            <td>
                                <span th:class="${p.estado == 'confirmado' ? 'badge bg-success' : 'badge bg-danger'}" 
                                      th:text="${p.estado}"></span>
                            </td>
                            <td class="text-center">
                                <div class="btn-group shadow-sm">
                                    <a th:href="@{/admin/pagos/ver/{id}(id=${p.idPago})}" 
                                       class="btn btn-sm btn-outline-secondary" title="Ver Comprobante">
                                        <i class="fas fa-eye text-primary"></i>
                                    </a>
                                    <a th:href="@{/admin/pagos/eliminar/{id}(id=${p.idPago})}" 
                                       class="btn btn-sm btn-outline-secondary" title="Eliminar"
                                       onclick="return confirm('¿Está seguro de eliminar este registro de pago permanentemente?')">
                                        <i class="fas fa-trash-alt text-danger"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/layout :: scripts_imports}"></div>
</body>
</html>
