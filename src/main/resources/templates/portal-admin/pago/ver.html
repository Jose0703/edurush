<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EduRush | Comprobante de Pago</title>
    <th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body>
    <div th:replace="~{fragments/layout :: navbar_principal}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card card-edurush text-center p-4">
                    <div class="my-3">
                        <i class="fas fa-receipt fa-4x text-success shadow-sm rounded-circle p-3 bg-light"></i>
                    </div>
                    <h3 class="fw-bold mb-0">Comprobante de Pago</h3>
                    <p class="text-muted" th:text="${'Transacción #' + p.idPago}"></p>
                    <hr>
                    
                    <div class="text-start px-3">
                        <p class="mb-2"><strong>Estudiante:</strong> <span th:text="${p.ordenPago.estudiante.nombres + ' ' + p.ordenPago.estudiante.apellidos}"></span></p>
                        <p class="mb-2"><strong>Referencia:</strong> <span th:text="${'Orden de Pago #' + p.ordenPago.idOrdenPago}"></span></p>
                        <p class="mb-2"><strong>Concepto:</strong> <span th:text="${p.ordenPago.descripcion}"></span></p>
                        <p class="mb-2"><strong>Fecha de Pago:</strong> <span th:text="${#temporals.format(p.fechaPago, 'dd/MM/yyyy HH:mm')}"></span></p>
                        
                        <div class="bg-light p-3 rounded mt-3 text-center">
                            <span class="text-secondary d-block small">Monto Total Pagado</span>
                            <span class="fs-2 fw-bold text-success" th:text="${'S/ ' + #numbers.formatDecimal(p.montoPagado, 1, 2)}"></span>
                        </div>
                        
                        <p class="mt-3 mb-0 text-center">
                            <strong>Estado:</strong> 
                            <span th:class="${p.estado == 'confirmado' ? 'badge bg-success' : 'badge bg-danger'}" 
                                  th:text="${p.estado}"></span>
                        </p>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button onclick="window.print();" class="btn btn-outline-dark">
                            <i class="fas fa-print me-1"></i> Imprimir Recibo
                        </button>
                        <a th:href="@{/admin/pagos}" class="btn btn-primary">Cerrar Detalle</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/layout :: scripts_imports}"></div>
</body>
</html>
