<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EduRush | Registrar Pago</title>
    <th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body>
    <div th:replace="~{fragments/layout :: navbar_principal}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card card-edurush">
                    <div class="card-header bg-white border-0 pt-4 text-center">
                        <h4 class="fw-bold text-primary" th:text="${titulo}"></h4>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/admin/pagos/guardar}" th:object="${pago}" method="post">
                            <input type="hidden" th:field="*{idPago}">
                            
                            <div class="mb-4">
                                <label class="form-label fw-bold text-secondary">Seleccionar Orden de Pago</label>
                                <select th:field="*{ordenPago}" class="form-select form-control-lg" required>
                                    <option value="" hidden>-- Busque la orden del estudiante --</option>
                                    <option th:each="o : ${ordenes}" th:value="${o.idOrdenPago}" 
                                            th:text="${'#' + o.idOrdenPago + ' - ' + o.estudiante.nombres + ' (Monto: S/ ' + o.montoTotal + ')'}"></option>
                                </select>
                                <small class="text-muted">Solo aparecerán órdenes pendientes de pago.</small>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold text-secondary">Monto Recibido (S/)</label>
                                    <input type="number" step="0.01" th:field="*{montoPagado}" class="form-control" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold text-secondary">Estado del Pago</label>
                                    <select th:field="*{estado}" class="form-select">
                                        <option value="confirmado">Confirmado</option>
                                        <option value="rechazado">Rechazado</option>
                                        <option value="anulado">Anulado</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">Fecha y Hora de Operación</label>
                                <input type="datetime-local" th:field="*{fechaPago}" class="form-control" required>
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-success btn-lg shadow-sm">Confirmar Operación</button>
                                <a th:href="@{/admin/pagos}" class="btn btn-link text-decoration-none">Cancelar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/layout :: scripts_imports}"></div>
</body>
</html>
