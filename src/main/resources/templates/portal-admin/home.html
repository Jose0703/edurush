<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EduRush | Panel Administrativo</title>
    <th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body>
    <div th:replace="~{fragments/layout :: navbar_principal}"></div>

    <div class="container mt-5">
        <div class="row mb-4">
            <div class="col-12">
                <h2 class="fw-bold">Bienvenido, Administrador</h2>
                <p class="text-muted">Gestión global del sistema EduRush.</p>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="card card-edurush p-4 text-center h-100">
                    <i class="fas fa-users-cog fa-3x text-primary mb-3"></i>
                    <h4>Usuarios</h4>
                    <p class="small text-muted">Gestionar cuentas, roles y accesos al sistema.</p>
                    <a th:href="@{/admin/usuarios}" class="btn btn-primary mt-auto">Ir a Usuarios</a>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card card-edurush p-4 text-center h-100">
                    <i class="fas fa-book fa-3x text-success mb-3"></i>
                    <h4>Cursos</h4>
                    <p class="small text-muted">Configuración de mallas curriculares y asignaturas.</p>
                    <button class="btn btn-outline-success mt-auto" disabled>Próximamente</button>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card card-edurush p-4 text-center h-100">
                    <i class="fas fa-chart-line fa-3x text-warning mb-3"></i>
                    <h4>Reportes</h4>
                    <p class="small text-muted">Estadísticas de matriculados y rendimiento.</p>
                    <button class="btn btn-outline-warning mt-auto" disabled>Próximamente</button>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/layout :: scripts_imports}"></div>
</body>
</html>
