<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EduRush | Gestión de Aulas</title>
    <th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body>

    <div th:replace="~{fragments/layout :: navbar_principal}"></div>

    <div class="container mt-5">
        <div class="card card-edurush p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-dark">
                    <i class="fas fa-door-open me-2 text-primary"></i>Gestión de Aulas
                </h3>

                <a th:href="@{/admin/aulas/nuevo}" class="btn btn-primary px-4 shadow-sm">
                    <i class="fas fa-plus-circle me-1"></i> Nueva Aula
                </a>
            </div>

            <div class="rounded-table-container">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark-custom">
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Código</th>
                            <th>Capacidad</th>
                            <th>Estado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="a : ${aulas}">
                            <td class="ps-4 fw-bold" th:text="${a.idAula}"></td>

                            <td>
                                <span class="fw-bold" th:text="${a.codigo}"></span>
                            </td>

                            <td th:text="${a.capacidad}"></td>

                            <td>
                                <span class="badge px-3 py-2"
                                      th:classappend="${a.estado == 'disponible'} ? ' bg-success' : 
                                                      (${a.estado == 'mantenimiento'} ? ' bg-warning text-dark' : ' bg-secondary')"
                                      th:text="${a.estado}">
                                </span>
                            </td>

                            <td class="text-center">
                                <div class="btn-group shadow-sm">
                                    <a th:href="@{/admin/aulas/ver/{id}(id=${a.idAula})}"
                                       class="btn btn-sm btn-outline-secondary"
                                       title="Ver Detalles">
                                        <i class="fas fa-eye text-primary"></i>
                                    </a>

                                    <a th:href="@{/admin/aulas/editar/{id}(id=${a.idAula})}"
                                       class="btn btn-sm btn-outline-secondary"
                                       title="Editar">
                                        <i class="fas fa-edit text-warning"></i>
                                    </a>

                                    <a th:href="@{/admin/aulas/eliminar/{id}(id=${a.idAula})}"
                                       class="btn btn-sm btn-outline-secondary"
                                       title="Inactivar"
                                       onclick="return confirm('¿Seguro que desea inactivar esta aula?')">
                                        <i class="fas fa-ban text-danger"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(aulas)}">
                            <td colspan="5" class="text-center text-muted py-4">
                                No hay aulas registradas.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts_imports}"></div>
</body>
</html>
