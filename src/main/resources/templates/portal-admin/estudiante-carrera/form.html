<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EduRush | Formulario de Asignación</title>
    <th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body>
    <div th:replace="~{fragments/layout :: navbar_principal}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card card-edurush">
                    <div class="card-header bg-white border-0 pt-4 text-center">
                        <h4 class="fw-bold text-primary" th:text="${titulo}"></h4>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/admin/estudiante-carrera/guardar}" th:object="${estudianteCarrera}" method="post">
                            <input type="hidden" th:field="*{idEstudianteCarrera}">
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">Estudiante</label>
                                <select th:field="*{estudiante}" class="form-select form-control-lg" required>
                                    <option value="" hidden>-- Seleccione un alumno --</option>
                                    <option th:each="e : ${estudiantes}" th:value="${e.idEstudiante}" 
                                            th:text="${e.dni + ' - ' + e.nombres + ' ' + e.apellidos}"></option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">Carrera Profesional</label>
                                <select th:field="*{carrera}" class="form-select form-control-lg" required>
                                    <option value="" hidden>-- Seleccione la carrera --</option>
                                    <option th:each="c : ${carreras}" th:value="${c.idCarrera}" th:text="${c.nombre}"></option>
                                </select>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold text-secondary">Fecha de Ingreso</label>
                                    <input type="datetime-local" th:field="*{fechaIngreso}" class="form-control" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold text-secondary">Estado Académico</label>
                                    <select th:field="*{estado}" class="form-select text-capitalize">
                                        <option value="pre_matriculado">Pre-Matriculado</option>
                                        <option value="activo">Activo</option>
                                        <option value="suspendido">Suspendido</option>
                                        <option value="finalizado">Finalizado</option>
                                        <option value="abandonado">Abandonado</option>
                                        <option value="transferido">Transferido</option>
                                    </select>
                                </div>
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-primary btn-lg shadow-sm">Guardar Asignación</button>
                                <a th:href="@{/admin/estudiante-carrera}" class="btn btn-link text-decoration-none">Regresar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/layout :: scripts_imports}"></div>
</body>
</html>
