<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EduRush | Asignación de Carreras</title>
    <th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body>
    <div th:replace="~{fragments/layout :: navbar_principal}"></div>

    <div class="container mt-5">
        <div class="card card-edurush p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-dark">
                    <i class="fas fa-graduation-cap me-2 text-primary"></i>Asignación de Carreras
                </h3>
                <a th:href="@{/admin/estudiante-carrera/nuevo}" class="btn btn-primary px-4 shadow-sm">
                    <i class="fas fa-user-plus me-1"></i> Nueva Asignación
                </a>
            </div>
            <div class="rounded-table-container">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark-custom">
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Estudiante</th>
                            <th>Carrera</th>
                            <th>Fecha Ingreso</th>
                            <th>Estado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="ec : ${lista}">
                            <td class="ps-4 fw-bold" th:text="${ec.idEstudianteCarrera}"></td>
                            <td>
                                <span class="fw-bold" th:text="${ec.estudiante.nombres + ' ' + ec.estudiante.apellidos}"></span>
                                <br><small class="text-muted" th:text="${'DNI: ' + ec.estudiante.dni}"></small>
                            </td>
                            <td th:text="${ec.carrera.nombre}"></td>
                            <td th:text="${#temporals.format(ec.fechaIngreso, 'dd/MM/yyyy')}"></td>
                            <td>
                                <span class="badge bg-primary-subtle text-primary px-3 py-2 text-capitalize" 
                                      th:text="${ec.estado}"></span>
                            </td>
                            <td class="text-center">
                                <div class="btn-group shadow-sm">
                                    <a th:href="@{/admin/estudiante-carrera/ver/{id}(id=${ec.idEstudianteCarrera})}" 
                                       class="btn btn-sm btn-outline-secondary" title="Ver Detalles">
                                        <i class="fas fa-eye text-primary"></i>
                                    </a>
                                    <a th:href="@{/admin/estudiante-carrera/editar/{id}(id=${ec.idEstudianteCarrera})}" 
                                       class="btn btn-sm btn-outline-secondary" title="Editar">
                                        <i class="fas fa-edit text-warning"></i>
                                    </a>
                                    <a th:href="@{/admin/estudiante-carrera/eliminar/{id}(id=${ec.idEstudianteCarrera})}" 
                                       class="btn btn-sm btn-outline-secondary" title="Eliminar"
                                       onclick="return confirm('¿Está seguro de eliminar esta asignación permanentemente?')">
                                        <i class="fas fa-trash-alt text-danger"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/layout :: scripts_imports}"></div>
</body>
</html>
