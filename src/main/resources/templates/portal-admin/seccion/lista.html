<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EduRush | Secciones</title>
    <th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body>
    <div th:replace="~{fragments/layout :: navbar_principal}"></div>
    <div class="container mt-5">
        <div class="card card-edurush p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-dark"><i class="fas fa-layer-group me-2 text-primary"></i>Secciones</h3>
                <a th:href="@{/admin/secciones/nuevo}" class="btn btn-primary shadow-sm"><i class="fas fa-plus-circle me-1"></i> Nueva Sección</a>
            </div>
            <div class="rounded-table-container">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark-custom">
                        <tr>
                            <th class="ps-4">Código</th>
                            <th>Curso</th>
                            <th>Periodo</th>
                            <th>Cupo</th>
                            <th>Estado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="s : ${secciones}">
                            <td class="ps-4 fw-bold" th:text="${s.codigo}"></td>
                            <td th:text="${s.curso.nombre}"></td>
                            <td th:text="${s.periodo.nombre}"></td>
                            <td th:text="${s.cupoTotal}"></td>
                            <td><span th:class="${s.estado == 'activo' ? 'badge bg-success' : 'badge bg-warning text-dark'}" th:text="${s.estado}"></span></td>
                            <td class="text-center">
                                <div class="btn-group">
                                    <a th:href="@{/admin/secciones/ver/{id}(id=${s.idSeccion})}" class="btn btn-sm btn-outline-secondary"><i class="fas fa-eye text-primary"></i></a>
                                    <a th:href="@{/admin/secciones/editar/{id}(id=${s.idSeccion})}" class="btn btn-sm btn-outline-secondary"><i class="fas fa-edit text-warning"></i></a>
                                    <a th:href="@{/admin/secciones/eliminar/{id}(id=${s.idSeccion})}" class="btn btn-sm btn-outline-secondary" onclick="return confirm('¿Inactivar sección?')"><i class="fas fa-trash text-danger"></i></a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/layout :: scripts_imports}"></div>
</body>
</html>
