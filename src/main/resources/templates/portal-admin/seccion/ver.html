<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EduRush | Detalle Sección</title>
    <th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body>
    <div th:replace="~{fragments/layout :: navbar_principal}"></div>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card card-edurush text-center p-4">
                    <div class="my-3 text-primary"><i class="fas fa-layer-group fa-4x p-3 bg-light rounded-circle shadow-sm"></i></div>
                    <h3 class="fw-bold mb-0" th:text="${'Sección: ' + s.codigo}"></h3>
                    <p class="text-muted" th:text="${s.curso.nombre}"></p>
                    <hr>
                    <div class="text-start px-3">
                        <p><strong>Periodo:</strong> <span th:text="${s.periodo.nombre}"></span></p>
                        <p><strong>Cupo Total:</strong> <span th:text="${s.cupoTotal}"></span></p>
                        <p><strong>Estado:</strong> <span th:class="${s.estado == 'activo' ? 'badge bg-success' : 'badge bg-warning text-dark'}" th:text="${s.estado}"></span></p>
                    </div>
                    <div class="d-grid gap-2 mt-4">
                        <a th:href="@{/admin/secciones/editar/{id}(id=${s.idSeccion})}" class="btn btn-warning">Editar</a>
                        <a th:href="@{/admin/secciones}" class="btn btn-outline-primary">Volver</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/layout :: scripts_imports}"></div>
</body>
</html>
