<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EduRush | Detalles de Usuario</title>
    <th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body>
    <div th:replace="~{fragments/layout :: navbar_principal}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card card-edurush text-center p-4">
                    <div class="my-3">
                        <i class="fas fa-user-shield fa-4x text-primary shadow-sm rounded-circle p-3 bg-light"></i>
                    </div>
                    <h3 class="fw-bold mb-0" th:text="${usuario.correo}"></h3>
                    <p class="text-muted mb-4">Información de cuenta</p>
                    
                    <ul class="list-group list-group-flush text-start mb-4">
                        <li class="list-group-item d-flex justify-content-between">
                            <span class="text-secondary">Rol asignado:</span>
                            <span class="fw-bold text-primary" th:text="${usuario.rol.nombre}"></span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between">
                            <span class="text-secondary">Estado actual:</span>
                            <span class="badge bg-success py-2 px-3" th:text="${usuario.estado}"></span>
                        </li>
                        <li class="list-group-item d-flex justify-content-between">
                            <span class="text-secondary">ID Sistema:</span>
                            <span th:text="${usuario.id}"></span>
                        </li>
                    </ul>

                    <div class="d-grid">
                        <a th:href="@{/admin/usuarios}" class="btn btn-outline-primary">Volver al Listado</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/layout :: scripts_imports}"></div>
</body>
</html>
