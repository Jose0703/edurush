<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EduRush | Gestión de Usuarios</title>
    <th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body>

    <div th:replace="~{fragments/layout :: navbar_principal}"></div>

    <div class="container mt-5">
        <div class="card card-edurush p-4">
        	<div class="d-flex justify-content-between align-items-center mb-4">
	            <h3 class="fw-bold text-dark">
	                <i class="fas fa-users-cog me-2 text-primary"></i>Gestión de Usuarios
	            </h3>
	            <a th:href="@{/admin/usuarios/nuevo}" class="btn btn-primary px-4 shadow-sm">
	                <i class="fas fa-plus-circle me-1"></i> Nuevo Usuario
	            </a>
	        </div>
            <div class="rounded-table-container">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark-custom">
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Correo Institucional</th>
                            <th>Rol Asignado</th>
                            <th>Estado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="u : ${usuarios}">
                            <td class="ps-4 fw-bold" th:text="${u.id}"></td>
                            <td th:text="${u.correo}"></td>
                            <td>
                                <span class="badge bg-primary-subtle text-primary px-3 py-2" 
                                      th:text="${u.rol.nombre}"></span>
                            </td>
                            <td>
                                <span class="badge bg-success" th:text="${u.estado}"></span>
                            </td>
                            <td class="text-center">
                                <div class="btn-group shadow-sm">
                                    <a th:href="@{/admin/usuarios/ver/{id}(id=${u.id})}" 
                                       class="btn btn-sm btn-outline-secondary" title="Ver Detalles">
                                        <i class="fas fa-eye text-primary"></i>
                                    </a>
                                    <a th:href="@{/admin/usuarios/editar/{id}(id=${u.id})}" 
                                       class="btn btn-sm btn-outline-secondary" title="Editar">
                                        <i class="fas fa-edit text-warning"></i>
                                    </a>
                                    <a th:href="@{/admin/usuarios/eliminar/{id}(id=${u.id})}" 
                                       class="btn btn-sm btn-outline-secondary" title="Inactivar"
                                       onclick="return confirm('¿Seguro que desea inactivar este usuario?')">
                                        <i class="fas fa-user-slash text-danger"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts_imports}"></div>
</body>
</html>
