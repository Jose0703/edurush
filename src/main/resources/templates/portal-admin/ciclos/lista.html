<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EduRush | Gestión de Ciclos</title>
    <th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body>

    <div th:replace="~{fragments/layout :: navbar_principal}"></div>

    <div class="container mt-5">
        <div class="card card-edurush p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-dark">
                    <i class="fas fa-sync-alt me-2 text-primary"></i>Gestión de Ciclos
                </h3>

                <a th:href="@{/admin/ciclos/nuevo}" class="btn btn-primary px-4 shadow-sm">
                    <i class="fas fa-plus-circle me-1"></i> Nuevo Ciclo
                </a>
            </div>

            <div class="rounded-table-container">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark-custom">
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Plan de Estudio</th>
                            <th>Carrera</th>
                            <th>Número de Ciclo</th>
                            <th>Estado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="c : ${ciclos}">
                            <td class="ps-4 fw-bold" th:text="${c.idCiclo}"></td>

                            <td>
                                <span class="fw-bold"
                                      th:text="${c.planEstudio != null ? c.planEstudio.nombre : 'Sin plan'}">
                                </span>
                            </td>

                            <td>
                                <span th:text="${c.planEstudio != null && c.planEstudio.carrera != null ? c.planEstudio.carrera.nombre : 'Sin carrera'}"></span>
                            </td>

                            <td>
                                <span class="badge bg-primary-subtle text-primary px-3 py-2"
                                      th:text="${'Ciclo ' + c.numeroCiclo}">
                                </span>
                            </td>

                            <td>
                                <span class="badge px-3 py-2"
                                      th:classappend="${c.estado == 'activo'} ? ' bg-success' : ' bg-secondary'"
                                      th:text="${c.estado}">
                                </span>
                            </td>

                            <td class="text-center">
                                <div class="btn-group shadow-sm">
                                    <a th:href="@{/admin/ciclos/ver/{id}(id=${c.idCiclo})}"
                                       class="btn btn-sm btn-outline-secondary"
                                       title="Ver Detalles">
                                        <i class="fas fa-eye text-primary"></i>
                                    </a>

                                    <a th:href="@{/admin/ciclos/editar/{id}(id=${c.idCiclo})}"
                                       class="btn btn-sm btn-outline-secondary"
                                       title="Editar">
                                        <i class="fas fa-edit text-warning"></i>
                                    </a>

                                    <a th:href="@{/admin/ciclos/eliminar/{id}(id=${c.idCiclo})}"
                                       class="btn btn-sm btn-outline-secondary"
                                       title="Inactivar"
                                       onclick="return confirm('¿Seguro que desea inactivar este ciclo?')">
                                        <i class="fas fa-ban text-danger"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(ciclos)}">
                            <td colspan="6" class="text-center text-muted py-4">
                                No hay ciclos registrados.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts_imports}"></div>
</body>
</html>
