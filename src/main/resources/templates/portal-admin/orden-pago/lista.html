<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EduRush | Tesorería - Órdenes</title>
    <th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body>
    <div th:replace="~{fragments/layout :: navbar_principal}"></div>

    <div class="container mt-5">
        <div class="card card-edurush p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-dark">
                    <i class="fas fa-file-invoice-dollar me-2 text-primary"></i>Órdenes de Pago
                </h3>
                <a th:href="@{/admin/ordenes-pago/nuevo}" class="btn btn-primary px-4 shadow-sm">
                    <i class="fas fa-plus-circle me-1"></i> Generar Orden
                </a>
            </div>
            <div class="rounded-table-container">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark-custom">
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Estudiante</th>
                            <th>Descripción</th>
                            <th>Monto Total</th>
                            <th>Estado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="o : ${ordenes}">
                            <td class="ps-4 fw-bold" th:text="${o.idOrdenPago}"></td>
                            <td>
                                <span class="fw-bold" th:text="${o.estudiante.nombres + ' ' + o.estudiante.apellidos}"></span>
                                <br><small class="text-muted" th:text="${'DNI: ' + o.estudiante.dni}"></small>
                            </td>
                            <td th:text="${o.descripcion}"></td>
                            <td class="fw-bold text-dark" th:text="${'S/ ' + #numbers.formatDecimal(o.montoTotal, 1, 2)}"></td>
                            <td>
                                <span th:class="${o.estado == 'pagado' ? 'badge bg-success' : 
                                                 (o.estado == 'pendiente' ? 'badge bg-warning text-dark' : 'badge bg-danger')}" 
                                      th:text="${o.estado}"></span>
                            </td>
                            <td class="text-center">
                                <div class="btn-group shadow-sm">
                                    <a th:href="@{/admin/ordenes-pago/ver/{id}(id=${o.idOrdenPago})}" 
                                       class="btn btn-sm btn-outline-secondary" title="Ver Detalles">
                                        <i class="fas fa-eye text-primary"></i>
                                    </a>
                                    <a th:href="@{/admin/ordenes-pago/editar/{id}(id=${o.idOrdenPago})}" 
                                       class="btn btn-sm btn-outline-secondary" title="Editar">
                                        <i class="fas fa-edit text-warning"></i>
                                    </a>
                                    <a th:href="@{/admin/ordenes-pago/eliminar/{id}(id=${o.idOrdenPago})}" 
                                       class="btn btn-sm btn-outline-secondary" title="Eliminar"
                                       onclick="return confirm('¿Está seguro de eliminar esta orden permanentemente?')">
                                        <i class="fas fa-trash-alt text-danger"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/layout :: scripts_imports}"></div>
</body>
</html>
