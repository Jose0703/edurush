<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EduRush | Gestión de Roles</title>
    <th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body>

    <div th:replace="~{fragments/layout :: navbar_principal}"></div>

    <div class="container mt-5">
        <div class="card card-edurush p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-dark">
                    <i class="fas fa-user-tag me-2 text-primary"></i>Gestión de Roles
                </h3>
                <a th:href="@{/admin/roles/nuevo}" class="btn btn-primary px-4 shadow-sm">
                    <i class="fas fa-plus-circle me-1"></i> Nuevo Rol
                </a>
            </div>
            <div class="rounded-table-container">
                <table class="table table-striped table-hover align-middle mb-0">
                    <thead class="table-dark-custom">
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Nombre del Rol</th>
                            <th>Estado</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="r : ${roles}">
                            <td class="ps-4 fw-bold" th:text="${r.idRol}"></td>
                            <td th:text="${r.nombre}"></td>
                            <td>
                                <span th:classappend="${r.estado == 'activo' ? 'badge bg-success' : 'badge bg-danger'}" 
                                      th:text="${r.estado}" class="badge"></span>
                            </td>
                            <td class="text-center">
                                <div class="btn-group shadow-sm">
                                    <a th:href="@{/admin/roles/ver/{id}(id=${r.idRol})}" 
                                       class="btn btn-sm btn-outline-secondary" title="Ver Detalles">
                                        <i class="fas fa-eye text-primary"></i>
                                    </a>
                                    <a th:href="@{/admin/roles/editar/{id}(id=${r.idRol})}" 
                                       class="btn btn-sm btn-outline-secondary" title="Editar">
                                        <i class="fas fa-edit text-warning"></i>
                                    </a>
                                    <a th:href="@{/admin/roles/eliminar/{id}(id=${r.idRol})}" 
                                       class="btn btn-sm btn-outline-secondary" title="Inactivar"
                                       onclick="return confirm('¿Seguro que desea inactivar este rol?')">
                                        <i class="fas fa-trash-alt text-danger"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: scripts_imports}"></div>
</body>
</html>
