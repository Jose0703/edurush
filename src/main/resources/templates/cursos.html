<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">
    <title>Gestión de Cursos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        .table-custom-header th {
            background-color: #212529;
            color: white;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
    </style>

</head>

<body>

<nav class="navbar navbar-dark bg-primary py-3">
    <div class="container-fluid px-4">

        <span class="navbar-brand mb-0 h1">
            EduRush
        </span>

    </div>
</nav>

<div class="container mt-5">

    <div  class="bg-white p-4 rounded-4 shadow-sm border border-light-subtle">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="text-dark fw-bold mb-0 d-flex align-items-center gap-2">
                <i class="bi bi-collection-fill text-primary"></i> Gestión de Cursos
            </h1>

        	<a th:href="@{/cursos/nuevo}" class="btn btn-primary rounded-3 px-3 fw-semibold">
                <i class="bi bi-plus-circle-fill me-1"></i> Nuevo Curso
         	</a>

    </div>

    <div class="table-responsive rounded-3 border overflow-hidden">
    <table class="table table-hover table-striped text-center align-middle mb-0">

        <thead class="table-custom-header">

            <tr class="align-middle" style="height: 50px;">
                <th>ID</th>
                <th>Nombre</th>
                <th>Créditos</th>
                <th>Modalidad</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>

        </thead>

        <tbody>

            <tr th:each="c : ${cursos}">

                <td class="fw-bold text-secondary" th:text="${c.idCurso}"></td>
                <td th:text="${c.nombre}"></td>
                <td th:text="${c.creditos}"></td>
                <td>
                    <span class="badge bg-primary bg-opacity-10 text-primary px-3 py-2 rounded-2 fw-semibold" 
                          th:text="${c.modalidad}"></span>
                </td>

                <td>
                <span class="badge bg-success px-3 py-2 rounded-2 fw-semibold" 
                            th:text="${c.estado}"></span>
                </td>

                <td>
                      <div class="d-flex justify-content-center gap-1">
                          <a th:href="@{/cursos/detalle/{id}(id=${c.idCurso})}"
                             class="btn btn-outline-primary btn-sm px-2">
                              <i class="bi bi-eye"></i>
                          </a>

                          <a th:href="@{/cursos/editar/{id}(id=${c.idCurso})}"
                             class="btn btn-outline-warning btn-sm px-2">
                              <i class="bi bi-pencil-square"></i>
                          </a>

                          <a th:href="@{/cursos/eliminar/{id}(id=${c.idCurso})}"
                             class="btn btn-outline-danger btn-sm px-2">
                              <i class="bi bi-trash-fill"></i>
                          </a>
                       </div>
                  </td>

            </tr>

        </tbody>

    </table>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
