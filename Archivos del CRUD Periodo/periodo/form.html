<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EduRush | Formulario Periodo</title>
    <th:block th:replace="~{fragments/layout :: head_imports}"></th:block>
</head>
<body>
    <div th:replace="~{fragments/layout :: navbar_principal}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card card-edurush">
                    <div class="card-header bg-white border-0 pt-4 text-center">
                        <h4 class="fw-bold text-primary" th:text="${titulo}"></h4>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/admin/periodos/guardar}" th:object="${periodo}" method="post">
                            <input type="hidden" th:field="*{idPeriodo}">
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">Nombre del Periodo</label>
                                <input type="text" th:field="*{nombre}" class="form-control form-control-lg" 
                                       placeholder="Ej: 2026-I" required>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold text-secondary">Fecha Inicio</label>
                                    <input type="date" th:field="*{fechaInicio}" class="form-control" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold text-secondary">Fecha Fin</label>
                                    <input type="date" th:field="*{fechaFin}" class="form-control" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold text-secondary">Estado del Periodo</label>
                                <select th:field="*{estado}" class="form-select text-capitalize">
                                    <option value="abierto">Abierto</option>
                                    <option value="cerrado">Cerrado</option>
                                </select>
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-primary btn-lg shadow-sm">Guardar Periodo</button>
                                <a th:href="@{/admin/periodos}" class="btn btn-link text-decoration-none">Regresar</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{fragments/layout :: scripts_imports}"></div>
</body>
</html>
